info:
  contact: {}
  title: AI Agent Productivity Platform - Open API
  version: v0.0.1
paths:
  /.well-known/openid-configuration:
    get:
      description: 自动获取 OP 的配置信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OAuthConfig'
      summary: 动态客户端发现配置
      tags:
      - openapi.OIDC
  /agent:
    post:
      consumes:
      - application/json
      description: 创建智能体OpenAPI
      parameters:
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.OpenAPICreateAgentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/response.OpenAPICreateAgentResponse'
              type: object
      summary: 创建智能体OpenAPI
      tags:
      - openapi
  /agent/chat:
    post:
      consumes:
      - application/json
      description: 智能体对话OpenAPI
      parameters:
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.OpenAPIAgentChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OpenAPIAgentChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: 智能体对话OpenAPI
      tags:
      - openapi
  /agent/chat/draft:
    post:
      consumes:
      - application/json
      description: 智能体草稿态对话OpenAPI，基于草稿配置进行问答，不要求智能体已发布，不计入统计
      parameters:
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.OpenAPIAgentDraftChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OpenAPIAgentChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: 智能体草稿态对话OpenAPI
      tags:
      - openapi
  /agent/config:
    put:
      consumes:
      - application/json
      description: 更新智能体配置OpenAPI
      parameters:
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.OpenAPIAgentConfigUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 更新智能体配置OpenAPI
      tags:
      - openapi
  /agent/conversation:
    post:
      consumes:
      - application/json
      description: 智能体创建对话OpenAPI
      parameters:
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.OpenAPIAgentCreateConversationRequest'
      produces:
      - application/json
      responses:
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/response.OpenAPIAgentCreateConversationResponse'
              type: object
      summary: 智能体创建对话OpenAPI
      tags:
      - openapi
  /agent/info:
    get:
      consumes:
      - application/json
      description: 获取智能体详情，通过 published 参数控制返回草稿态或已发布态配置
      parameters:
      - description: 智能体UUID
        in: query
        name: uuid
        required: true
        type: string
      - description: true=已发布态，false=草稿态（默认）
        in: query
        name: published
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/response.Assistant'
              type: object
      summary: 获取智能体详情OpenAPI
      tags:
      - openapi
  /agent/publish:
    post:
      consumes:
      - application/json
      description: 发布智能体，发布后可通过智能体对话接口进行正式问答
      parameters:
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.OpenAPIAgentPublishRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 智能体发布OpenAPI
      tags:
      - openapi
  /chatflow/chat:
    post:
      consumes:
      - application/json
      description: 对话流OpenAPI
      parameters:
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.OpenAPIChatflowChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 对话流OpenAPI
      tags:
      - openapi
  /chatflow/conversation:
    post:
      consumes:
      - application/json
      description: 对话流创建对话OpenAPI
      parameters:
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.OpenAPIChatflowCreateConversationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/response.OpenAPIChatflowCreateConversationResponse'
              type: object
      summary: 对话流创建对话OpenAPI
      tags:
      - openapi
  /chatflow/conversation/message/list:
    post:
      consumes:
      - application/json
      description: 对话流根据conversationId获取历史对话
      parameters:
      - description: 请求参数
        in: body
        name: data
        schema:
          $ref: '#/definitions/request.OpenAPIChatflowGetConversationMessageListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/response.OpenAPIChatflowGetConversationMessageListResponse'
              type: object
      summary: 对话流根据conversationId获取历史对话
      tags:
      - openapi
  /chatflow/file/upload:
    post:
      consumes:
      - multipart/form-data
      description: 对话流OpenAPI文件上传
      parameters:
      - description: 文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: 对话流OpenAPI文件上传
      tags:
      - openapi
  /file/upload/direct:
    post:
      consumes:
      - multipart/form-data
      description: 文件上传
      parameters:
      - description: 原始文件名
        in: formData
        name: fileName
        required: true
        type: string
      - description: 文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/response.UploadFileResp'
              type: object
      security:
      - JWT: []
      summary: 文件上传
      tags:
      - openapi
  /knowledge:
    delete:
      consumes:
      - application/json
      description: 删除知识库openapi
      parameters:
      - description: 删除知识库请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.DeleteKnowledge'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 删除知识库openapi
      tags:
      - openapi
    post:
      consumes:
      - application/json
      description: 新建知识库OpenAPI
      parameters:
      - description: 创建知识库请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.CreateKnowledgeReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/response.CreateKnowledgeResp'
              type: object
      summary: 新建知识库OpenAPI
      tags:
      - openapi
    put:
      consumes:
      - application/json
      description: 修改知识库openapi
      parameters:
      - description: 修改知识库请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.UpdateKnowledgeReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 修改知识库openapi
      tags:
      - openapi
  /knowledge/doc:
    delete:
      consumes:
      - application/json
      description: 删除文档
      parameters:
      - description: 删除文档请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.DeleteDocReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - JWT: []
      summary: 删除文档
      tags:
      - openapi
  /knowledge/doc/config:
    get:
      consumes:
      - application/json
      description: 获取文档配置信息
      parameters:
