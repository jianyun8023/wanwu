services:

  wga-sandbox:
    restart: always
    image: ${WANWU_WGA_SANDBOX_IMAGE}
    container_name: wga-sandbox-wanwu
    security_opt:
      - seccomp=unconfined
    networks:
      - ${WANWU_DOCKER_NETWORK}
    # ports:
    #   - 4096:4096
    #   - 8080:8080
    #   - 4097:4097
    # volumes:
    #   - ./configs/microservice/bff-service/configs/agent-skills/anthropics:/home/root/.claude/skills
    environment:
      USER: root
      COZELOOP_ENABLED: ${COZELOOP_ENABLED}
      COZELOOP_WORKSPACE_ID: ${COZELOOP_WORKSPACE_ID}
      COZELOOP_API_TOKEN: ${COZELOOP_API_TOKEN}
      COZELOOP_API_BASE_URL: ${COZELOOP_API_BASE_URL}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 15s
      timeout: 5s
      retries: 99
      start_period: 10s


networks:
  wanwu-net:
    external: true