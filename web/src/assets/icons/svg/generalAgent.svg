    <path d="M6 13.5 L7.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M14 13.5 L12.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

    <!-- 中心光芒 -->
    <path d="M10 2 L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M10 16 L10 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
