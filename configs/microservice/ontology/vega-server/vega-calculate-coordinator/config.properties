coordinator=true
node-scheduler.include-coordinator=true
discovery-server.enabled=true
discovery.uri=http://vega-calculate-coordinator:8090
http-server.http.port=8090
catalog.dynamic-enabled=true
# 单节点 docker 部署：动态 catalog 共享存储改用本地文件系统（镜像默认 hdfs-config-default 需 core-site.xml，会崩溃）
catalog.share.filesystem.profile=local-config-default
# SqlConfiguration 读取 <connection.config-dir>/mysql.properties；不设则解析为 null/mysql.properties（非致命但刷错误日志）
connection.config-dir=/opt/openlookeng/hetu-server-1.9.0/etc
join-distribution-type=AUTOMATIC
optimizer.join-reordering-strategy=AUTOMATIC
stack-trace-visible=true
implicit-conversion=true
scheduler.http-client.max-requests-queued-per-destination=2048
http-server.threads.max=500
query.client.timeout=30m
query.max-run-time=24h
# 保留查询元数据，杜绝对象被立即回收，解决NPE
query.max-history=1000
query.min-expire-age=15m
retry-policy=NONE

http-server.max-request-header-size=512kB
http-server.max-response-header-size=512kB
query.max-memory=1GB
query.max-total-memory=1.2GB
query.max-memory-per-node=1GB
query.max-total-memory-per-node=1.2GB
memory.heap-headroom-per-node=0.5GB
query.low-memory-killer.policy=total-reservation-on-blocked-nodes
query.max-stage-count=500
hetu.queryeditor-ui.allow-insecure-over-http=true
auto-vacuum.enabled=true
auto-vacuum.scan.interval=1m
auto-vacuum.scan.threads=16
experimental.enable-execution-plan-cache=false
hetu.executionplan.cache.enabled=false