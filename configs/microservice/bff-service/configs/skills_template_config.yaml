    desc: "数据分析员工（Data Analyst Agent）的唯一总入口：凡与数据资产、取数、指标、表/视图、治理职责、知识网络、统计或分析相关的问题，必须先经本skill做编排与路由，再进入找表或问数等子流程。负责kn分域、上下文注入（accountId/date）、多候选KN时的LLM决策、问数分支的SQL生成；与smart-search-tables/smart-ask-data/ontology-core的交接。当用户提出任何数据类自然语言任务、或需在多条业务KN间切换时使用；所有ontology CLI执行均委托ontology-core完成，本skill不直接执行CLI。"
