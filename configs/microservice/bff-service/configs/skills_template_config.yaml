  - skillId: "anthropics/xlsx"
    avatar: ""
    name: "电子表格处理(xlsx)"
    desc: "只要电子表格文件是主要输入或输出，均可使用此技能。这包括用户希望执行以下操作的任务：打开、读取、编辑或修复现有的 .xlsx、.xlsm、.csv 或 .tsv 文件（例如，添加列、计算公式、设置格式、制作图表、清理杂乱数据）；从头开始或基于其他数据源创建新的电子表格；或在表格文件格式之间进行转换。尤其当用户通过名称或路径引用电子表格文件时触发——即使是随口提及（如“我下载文件夹里的那个 xlsx 文件”）——并希望对该文件执行操作或从中生成内容。此外，将杂乱的表格数据文件（格式错误的行、错位的标题、垃圾数据）清理或重构为规范电子表格时，也可触发此技能。可交付成果必须是电子表格文件。若主要交付成果是 Word 文档、HTML 报告、独立 Python 脚本、数据库管道或 Google Sheets API 集成，即使涉及表格数据，请勿触发此技能。"
    author: "Anthropic"
    mdPath: "anthropics/xlsx/SKILL.md"
