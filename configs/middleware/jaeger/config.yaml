service:
  extensions: [jaeger_storage, jaeger_query, healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
  telemetry:
    resource:
      attributes:
        - name: service.name
          value: jaeger
    logs:
      level: info

extensions:
  healthcheckv2:
    use_v2: true
    http:
      endpoint: "0.0.0.0:13133"

  jaeger_query:
    base_path: /jaeger
    storage:
      traces: badgerstore

  jaeger_storage:
    backends:
      badgerstore:
        badger:
          directories:
            keys: /tmp/jaeger/badger/keys
            values: /tmp/jaeger/badger/values
          ephemeral: false
          ttl:
            spans: 168h

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: badgerstore
