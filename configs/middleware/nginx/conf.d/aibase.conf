server {
    #########################
    ## 基础服务配置
    #########################
    listen               8081;             # 监听8081端口（HTTP）
    listen               [::]:8081;        # IPv6支持
    server_name          _;                # 匹配所有请求（支持域名/IP访问）
    client_max_body_size 2048M;            # 允许上传最大2GB文件
    keepalive_timeout    128s;             # 保持连接超时时间
    server_tokens off;

    #########################
    ## 安全响应头
    #########################
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    #########################
    ## 代理超时配置（全局）
    #########################
    proxy_connect_timeout 60s;             # Nginx与上游服务器建立连接的超时时间
    proxy_send_timeout    300s;            # Nginx向上游服务器发送请求的超时时间（支持大文件上传）
    proxy_read_timeout    3600s;           # Nginx从上游服务器读取响应的超时时间（支持深度调研等超长任务/SSE流式响应）

    #########################
    ## 代理通用配置（全局）
    #########################
    proxy_http_version 1.1;                # 使用HTTP/1.1协议（支持长连接和chunked编码）
    proxy_set_header Connection '';        # 清空Connection头（支持SSE流式响应）
    chunked_transfer_encoding on;          # 启用分块传输编码（所有location自动继承）

    #########################
    ## Gzip压缩配置
    #########################
    gzip                on;                # 启用Gzip压缩
    gzip_static         on;                # 优先使用预压缩.gz文件
    gzip_min_length     1k;                # 最小压缩文件大小
    gzip_buffers        4 16k;             # 压缩缓冲区大小
    gzip_http_version   1.1;               # 压缩协议版本
    gzip_comp_level     2;                 # 压缩级别（1-9）
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/json
        application/json
        application/ld+json
        application/vnd.api+json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/x-font-woff
        application/vnd.ms-fontobject
        font/ttf
        font/woff
        font/woff2;
    gzip_vary           on;                # 添加Vary响应头
    gzip_proxied        any;               # 压缩所有代理响应
    gzip_disable        "MSIE [1-6]\.";    # 禁用旧版IE压缩

    #########################
    ## 前端静态资源路由
    #########################

    # 根路径入口 - 重定向到 aibase
    location = / {
        return 301 /aibase;
    }

    # aibase 主应用（SPA）
    location ^~ /aibase {
        try_files $uri $uri/ /aibase/index.html;
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    # TODO: 子应用预留配置，功能未实现
    # 如需使用子应用，需要将前端打包到 /usr/share/nginx/html/sub/
    location ^~ /sub {
        try_files $uri $uri/ /sub/index.html;
        root   /usr/share/nginx/html/aibase/;
        index  index.html index.htm;
    }

    #########################
    ## 前端Workflow静态资源路由
    #########################
    location ^~ /workflow {
        try_files $uri $uri/ /workflow/index.html;
        root   /usr/share/nginx/html/;
        index  index.html index.htm;
    }

    ########################
    ## 前端Ontology平台路由
    ########################
    # 使用变量 + resolver 延迟解析主机名，避免 nginx 启动时依赖 vega-web 容器
    # Docker 内部 DNS: 127.0.0.11
    location ^~ /vega/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $vega_backend vega-web:3010;
        proxy_pass http://$vega_backend$request_uri;
        proxy_buffering  off;
        proxy_cache      off;
    }

    ########################
    ## Jaeger链路追踪UI路由
    ########################
    # Jaeger v2 原生支持 base_path 配置（config.yaml 中 base_path: /jaeger）
    # 所有 API 路径自动加 /jaeger/ 前缀，UI 也自动检测挂载点前缀
    # 使用变量 + resolver 延迟解析主机名，避免 nginx 启动时依赖 jaeger-wanwu 容器
    # Docker 内部 DNS: 127.0.0.11
    location ^~ /jaeger/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $jaeger_backend jaeger-wanwu:16686;
        proxy_pass http://$jaeger_backend$request_uri;
        proxy_buffering  off;
        proxy_cache      off;
    }

    #########################
    ## 后端API代理配置
    #########################
    location ^~ /user/api/ {
        proxy_pass       http://bff-service:6668/;  # 用户服务API
        proxy_buffering  off;                       # 关闭缓冲（适合实时API）
        proxy_cache      off;                       # 禁用缓存
    }

    location ^~ /use/model/api/ {
        proxy_pass       http://bff-service:6668/;  # 模型服务API
        proxy_buffering  off;
        proxy_cache      off;
    }

    location ^~ /service/api/ {
        proxy_pass       http://bff-service:6668/;  # 通用服务API
        proxy_buffering  off;
        proxy_cache      off;
    }

    location ^~ /service/url/ {
        proxy_pass       http://bff-service:6668/;  # WebUrlAPI
        proxy_buffering  off;
        proxy_cache      off;
    }

    location ^~ /minio/download/api/ {
        proxy_pass      http://minio-wanwu:9000/;  # minio public
        proxy_buffering off;
        proxy_cache     off;
    }

    #########################
    ## Workflow API代理配置
    #########################
    location ^~ /api/ {
        proxy_pass       http://workflow-wanwu:8999/api/;
        proxy_buffering  off;
        proxy_cache      off;
    }

    location ^~ /v1/ {
        proxy_pass       http://workflow-wanwu:8999/v1/;
        proxy_buffering  off;
        proxy_cache      off;
    }

    location ^~ /workflow/minio/presign/ {
        proxy_pass      http://workflow-wanwu:8998/;
        proxy_buffering off;
        proxy_cache     off;
    }

    #########################
    ## 其他优化建议（可选）
    #########################
    # access_log /var/log/nginx/access.log main;  # 自定义访问日志
    # error_log  /var/log/nginx/error.log warn;   # 错误日志级别
}