syntax = "proto3";

package mcp_service;

import "proto/mcp-service/common.proto";

option go_package = "github.com/UnicomAI/wanwu/api/proto/mcp-service";

// --- custom skill ---
message CustomSkill {
  string skillId = 1;
  string name = 2;
  string avatar = 3;
  string author = 4;
  string desc = 5;
  string objectPath = 6;
  string wgaThreadId = 7;
  string previewThreadId = 8;
  repeated Variable variables = 9;
  int64 createdAt = 10;
  int64 updatedAt = 11;
}

message CustomSkillCreateReq {
  string name = 1;
  string avatar = 2;
  string author = 3;
  string desc = 4;
  string wgaThreadId = 5;
  string previewThreadId = 6;
  string sourceType = 7;
  Identity identity = 8;
}

message CustomSkillCreateResp {
  string skillId = 1;
}

message CustomSkillDeleteReq {
  string skillId = 1;
}

message CustomSkillGetReq {
  string skillId = 1;
}

// 按 wgaThreadId 在 identity 下查找 custom skill；未命中时 skillId 为空。非数据库错误不返回 RPC 错误。
message GetCustomSkillByThreadIDReq {
  string wgaThreadId = 1;
  Identity identity = 2;
}

message GetCustomSkillByThreadIDResp {
  string skillId = 1;
}

// 按 wgaThreadIdList 在 identity 下批量查找 custom skill，返回全量 CustomSkill（含 variables）。
// 未命中的 threadId 仍占一条：仅 wgaThreadId 有值、skillId 为空，与 GetCustomSkillByThreadID 未命中语义一致。非数据库错误不返回 RPC 错误。
message GetCustomSkillListByThreadIDListReq {
  Identity identity = 1;
  repeated string wgaThreadIdList = 2;
}

message CustomSkillGetListReq {
  string name = 1;
  int32 page = 2;
  int32 pageSize = 3;
  Identity identity = 4;
}

message CustomSkillGetListResp {
  repeated CustomSkill list = 1;
  int64 total = 2;
}

message CustomSkillGetBySaveIdsReq {
  repeated string saveIds = 1;
}

message CustomSkillSaveIdsResp {
  repeated string saveIds = 1;
}

message CustomSkillDetailByIdListReq {
  repeated string skillIds = 1;
}

message CustomSkillDetailByIdListResp {
  repeated CustomSkill skillDetails = 1;
}

message UpdateCustomSkillBasicMetaReq {
  string skillId = 1;   // 必填
  string name = 2;
  string desc = 3;
}

message UpdateCustomSkillThreadMetaReq {
  string skillId = 1;   // 必填
  string wgaThreadId = 2;
  string previewThreadId = 3;
}

message CreateCustomSkillVarReq {
  string skillId = 1;
  Variable variable = 2;
  Identity identity = 3;
}

message SkillVariableCreateResp {
  string id = 1;
}

message UpdateCustomSkillVarReq {
  string id = 1;
  Variable variable = 2;
  Identity identity = 3;
}

message DeleteCustomSkillVarReq {
  string id = 1;
  Identity identity = 2;
}

message GetCustomSkillVarsReq {
  string skillId = 1;
  Identity identity = 2;
}

message CustomSkillVars {
  string skillId = 1;
  repeated Variable variables = 2;
  int64 total = 3;
}

// --- custom skill publish ---
message PublishCustomSkillReq {
  string skillId = 1;
  string version = 2;
  string desc = 3;
  Identity identity = 4;
  repeated Variable variables = 5;
  string objectPath = 6;
  string markdown = 7;
  string gitCommit = 8;
}

message UpdatePublishCustomSkillReq {
  string skillId = 1;
  string desc = 2;
}

message GetPublishCustomSkillHistoryListReq {
  string skillId = 1;
}

message PublishCustomSkillHistoryListResp {
  repeated PublishCustomSkillHistory historyList = 1;
  int64 total = 2;
}

message PublishCustomSkillHistory {
  string skillId = 1;
  string version = 2;
  string desc = 3;
  int64 createdAt = 4;
}

message OverwriteCustomSkillDraftReq {
  string skillId = 1;
  string version = 2;
}

message GetPublishCustomSkillDescReq {
  string skillId = 1;
}

message PublishCustomSkillDescResp {
  string skillId = 1;
  string version = 2;
  string desc = 3;
  int64 createdAt = 4;
}

message GetPublishCustomSkillDescBatchReq {
  repeated string skillIdList = 1;
}

message PublishCustomSkillDescBatchResp {
  repeated PublishCustomSkillDescResp list = 1;
}

// --- acquired skill ---
message AcquiredSkill {
  string acquiredSkillId = 1;
  string squareSkillId = 2;
  string name = 3;
  string avatar = 4;
  string author = 5;
  string authorId = 6;
  string desc = 7;
  string objectPath = 8;
  string markdown = 9;
  string version = 10;
  string versionDescription = 11;
  repeated Variable variables = 12;
  int64 createdAt = 13;
  int64 updatedAt = 14;
}

message AcquiredSkillCreateReq {
  Identity identity = 1;
  string name = 2;
  string avatar = 3;
  string squareSkillId = 4;
  string author = 5;
  string authorId = 6;
  string desc = 7;
  string objectPath = 8;
  string markdown = 9;
  string version = 10;
  string versionDescription = 11;
}

message AcquiredSkillCreateResp {
  string acquiredSkillId = 1;
}

message AcquiredSkillDeleteReq {
  string acquiredSkillId = 1;
}

message AcquiredSkillGetReq {
  string acquiredSkillId = 1;
}

message AcquiredSkillGetListReq {
  Identity identity = 1;
  string name = 2;
}

message AcquiredSkillGetListResp {
  repeated AcquiredSkill list = 1;
  int64 total = 2;
}

message CreateAcquiredSkillVarReq {
  string skillId = 1;
  Variable variable = 2;
  Identity identity = 3;
}

message UpdateAcquiredSkillVarReq {
  string id = 1;
  Variable variable = 2;
  Identity identity = 3;
}

message DeleteAcquiredSkillVarReq {
  string id = 1;
  Identity identity = 2;
}

message GetAcquiredSkillVarsReq {
  string skillId = 1;
  Identity identity = 2;
}

message AcquiredSkillVars {
  string skillId = 1;
  repeated Variable variables = 2;
  int64 total = 3;
}

// --- builtin skill config ---
// skillId 为内置技能的业务字符串标识（如 pdf、excel），与 custom skill 表主键数字转成的 skillId 不同；禁止按 int 解析。
message CreateBuiltinSkillVarReq {
  string skillId = 1; // 内置 skill 业务 ID，任意合法字符串
  Variable variable = 2;
  Identity identity = 3;
}

message DeleteBuiltinSkillVarReq {
  string id = 1;
  Identity identity = 2;
}

// 查询单个 builtin skill（skillId）在当前 identity 下的全部配置变量。
message GetBuiltinSkillVarsReq {
  string skillId = 1; // 同上
  Identity identity = 2;
}

// 单个 skill 下的变量列表；total 与 variables 条数一致（全量、无分页）。
message BuiltinSkillVars {
  string skillId = 1; // 同上
  repeated Variable variables = 2;
  int64 total = 3;
}

message UpdateBuiltinSkillVarReq {
  string id = 1;
  Variable variable = 2;
  Identity identity = 3;
}

message Variable {
  string id = 1;
  string name = 2;
  string desc = 3;
  string variableKey = 4;
  string variableValue = 5;
}

